name: gussuri
description: A new Flutter application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  device_info_plus: ^12.3.0
  intl: ^0.20.2
  table_calendar: ^3.2.0
  flutter_hooks: ^0.21.3
  uuid: ^4.5.3
  pdf: ^3.12.0
  path_provider: ^2.1.5
  fluttertoast: ^9.0.0
  flutter_pdfview: ^1.4.4
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  provider: ^6.1.5
  csv: ^6.0.0
  firebase_crashlytics: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  build_runner: ^2.4.12

flutter:
  generate: true
  assets:
    - images/
    - assets/
  uses-material-design: true

flutter_launcher_icons:
  ios: true
  image_path_ios: "assets/icon-ios.png"
  remove_alpha_ios: true
